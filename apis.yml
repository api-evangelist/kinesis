aid: kinesis
name: AWS Kinesis
description: >-
  Amazon Kinesis is a family of fully managed AWS services for collecting,
  processing, and analyzing real-time streaming data. The family includes
  Kinesis Data Streams for scalable record ingestion, Amazon Data Firehose
  (formerly Kinesis Data Firehose) for delivery to data lakes and analytics
  destinations, Amazon Managed Service for Apache Flink (formerly Kinesis
  Data Analytics) for stateful stream processing, and Kinesis Video Streams
  for ingest and playback of media from connected devices.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
