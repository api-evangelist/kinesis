apis:
  - aid: kinesis:data-streams-api
    name: Amazon Kinesis Data Streams API
    description: >-
      Amazon Kinesis Data Streams is a scalable and durable real-time data
      streaming service that can continuously capture gigabytes of data per
      second from hundreds of thousands of sources. The API supports stream
      creation and lifecycle management, record put and get operations,
      shard discovery and resharding, enhanced fan-out consumers, and stream
      consumer registration for downstream processing.
    humanURL: https://aws.amazon.com/kinesis/data-streams/
    baseURL: https://kinesis.{region}.amazonaws.com
    tags:
      - Data Streams
      - Ingestion
      - Real-Time
      - Streaming
