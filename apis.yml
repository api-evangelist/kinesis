  - aid: kinesis:data-firehose-api
    name: Amazon Data Firehose API
    description: >-
      Amazon Data Firehose (formerly Amazon Kinesis Data Firehose) is the
      easiest way to reliably load streaming data into data lakes, data
      stores, and analytics services. Firehose can capture, transform with
      Lambda or built-in conversions, and deliver streaming data to Amazon
      S3, Amazon Redshift, Amazon OpenSearch Service, Splunk, and supported
      partner destinations with automatic scaling and retry handling.
    humanURL: https://aws.amazon.com/firehose/
    baseURL: https://firehose.{region}.amazonaws.com
