  - aid: kinesis:data-analytics-api
    name: Amazon Kinesis Data Analytics API
    description: >-
      Amazon Kinesis Data Analytics is a managed service for analyzing
      streaming data using SQL or Apache Flink. The API enables creation
      and management of streaming applications, input and output stream
      configuration, application code deployment, and runtime monitoring,
      enabling near real-time insights and event-driven actions on
      continuously arriving data.
