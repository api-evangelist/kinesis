  - aid: kinesis:video-streams-api
    name: Amazon Kinesis Video Streams API
    description: >-
      Amazon Kinesis Video Streams makes it easy to securely stream video,
      audio, and time-encoded data from connected devices to AWS for
      analytics, machine learning, playback, and other processing. The API
      supports stream lifecycle management, media ingest and retrieval, HLS
      and DASH playback URL generation, signaling for WebRTC peer
      connections, and integration with AWS Rekognition for video analysis.
    humanURL: https://aws.amazon.com/kinesis/video-streams/
    baseURL: https://kinesisvideo.{region}.amazonaws.com
