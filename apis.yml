  - aid: kinesis:managed-flink-api
    name: Amazon Managed Service for Apache Flink API
    description: >-
      Amazon Managed Service for Apache Flink (formerly Amazon Kinesis Data
      Analytics for Apache Flink) is a fully managed service for processing
      and analyzing streaming data using Apache Flink. Developers build
      streaming applications in Java, Python, SQL, or Scala, and the
      service handles infrastructure provisioning, scaling, state
      management, and high availability for stateful stream processing.
    humanURL: https://aws.amazon.com/managed-service-apache-flink/
