principles:
  - name: Visibility
    description: Use AWS Cost Explorer with usage-type filters (Kinesis-PUT-units, Kinesis-shardHourUsage,
      Firehose-DataIngested) and CloudWatch Kinesis metrics (IncomingBytes, IncomingRecords, GetRecords.IteratorAgeMilliseconds)
      to tie cost to throughput.
  - name: Allocation
    description: Apply cost-allocation tags (Owner, Team, Environment) to every stream and Firehose delivery
      stream; activate them in Cost Allocation Tags so CUR/FOCUS exports can split spend per consuming
      team.
  - name: Optimization
    description: Switch low-volume streams to On-Demand to avoid over-provisioned shards; for steady high
      throughput, use Provisioned with Application Auto Scaling on shard count, or move to On-Demand Advantage
      to bundle Enhanced Fan-Out without per-stream-hour fees.
  - name: Accountability
    description: Stream owners review monthly Cost & Usage Report Kinesis line items, alert on shard-hour
      spikes via CloudWatch billing alarms, and rebalance shards or capacity mode at the next change window
      (max two switches per 24h per stream).
