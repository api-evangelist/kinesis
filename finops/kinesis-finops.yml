description: 'FOCUS-aligned FinOps for AWS Kinesis: pure pay-as-you-go billed via the AWS consolidated
  invoice, with three Data Streams capacity modes (On-Demand Standard, On-Demand Advantage, Provisioned)
  and per-GB Firehose delivery. Reservations / Savings Plans do not apply.'
